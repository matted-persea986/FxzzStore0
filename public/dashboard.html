<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fxzz Store - المكتبة</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body data-page="dashboard">
  <div class="cursor-dot"></div>
  <div class="cursor-ring"></div>
  <div class="animated-bg">
    <span class="orb orb-1"></span>
    <span class="orb orb-2"></span>
    <span class="orb orb-3"></span>
    <span class="grid-lines"></span>
  </div>

  <header class="topbar-shell"><div class="topbar glass container">
    <div>
      <span class="brand-kicker">Fxzz Store</span>
      <h2 class="brand-title">Fxzz Store</h2>
      <p class="brand-sub" id="welcomeText">جارٍ التحميل...</p>
    </div>
    <nav class="topbar-nav">
      <a href="/dashboard.html">الرئيسية</a>
      <a href="/rules.html">القوانين</a>
      <a href="/admin.html" id="adminLink" class="hidden">لوحة الأدمن</a>
      <button class="danger-btn" id="logoutBtn">تسجيل الخروج</button>
    </nav>
      <div class="topbar-profile" id="profileWidget">
        <button type="button" class="profile-box ghost-btn" id="profileBtn">
          <span class="profile-avatar" id="profileAvatar">S</span>
          <span class="profile-text">
            <strong id="profileName">جارٍ التحميل...</strong>
            <small id="profileRole">مستخدم</small>
          </span>
        </button>
      </div>
    </div>
  </header>

  <a href="https://discord.gg/m32GkDW39B" target="_blank" class="discord-float" aria-label="Discord">
  <img src="https://cdn.discordapp.com/attachments/1339436496574349404/1483277484249317376/4c9d7000-ea7d-4e5c-a41e-e64f4b5858aa-removebg-preview.png?ex=69ba014e&is=69b8afce&hm=d43c1d7e4f76e5de41f047e44681567e611500587a961158a706f6cb86e335c3&" alt="Discord">
</a>


  <main class="container page-stack">
    <section class="hero-strip glass">
      <div class="stats-inline" id="quickStats"></div>
    </section>

    <section class="toolbar-grid">
      <div class="glass toolbar-box">
        <label>بحث سريع</label>
        <input id="searchInput" type="text" placeholder="ابحث باسم اللعبة أو اسم المستخدم أو التصنيف" />
      </div>
      <div class="glass toolbar-box dual-grid">
        <div>
          <label>التصنيف</label>
          <div id="categoryDropdown"></div>
          <select id="categoryFilter" class="native-select-hidden"></select>
        </div>
        <div>
          <label>الترتيب</label>
          <div id="sortDropdown"></div>
          <select id="sortFilter" class="native-select-hidden">
            <option value="newest">الأحدث</option>
            <option value="oldest">الأقدم</option>
            <option value="title-asc">A-Z</option>
            <option value="title-desc">Z-A</option>
          </select>
        </div>
      </div>
    </section>

    <section id="cardsGrid" class="cards-grid"></section>
  </main>

  <div id="toast" class="toast"></div>
  <div id="modalRoot"></div>
  <script src="/js/app.js"></script>
</body>
</html>
