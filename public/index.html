<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Steam Vault Green - تسجيل الدخول</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body data-page="login">
  <div class="cursor-dot"></div>
  <div class="cursor-ring"></div>
  <div class="animated-bg">
    <span class="orb orb-1"></span>
    <span class="orb orb-2"></span>
    <span class="orb orb-3"></span>
    <span class="grid-lines"></span>
  </div>

  <main class="login-shell container">
<section class="login-panel glass">
      <div class="section-head">
        <h2>FxzzStore</h2>
        <p>تسجيل دخول</p>
      </div>

      <form id="loginForm" class="form-stack">
        <div class="input-group">
          <label>البريد الإلكتروني</label>
          <input type="email" id="email" placeholder="name@example.com" autocomplete="username" />
        </div>

        <div class="input-group">
          <label>كلمة المرور</label>
          <div class="password-wrap">
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
            <button class="secondary-btn small-btn" type="button" id="toggleLoginPassword">إظهار</button>
          </div>
        </div>

        <button class="primary-btn" type="submit">الدخول إلى المنصة</button>
      </form>

      <div class="demo-box">
        <h3> حمار ابيض</h3>
      </div>
    </section>
  </main>

  <div id="toast" class="toast"></div>
  <script src="/js/app.js"></script>
</body>
</html>
